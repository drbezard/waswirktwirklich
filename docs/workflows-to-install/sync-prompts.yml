name: Sync Master-Prompts

on:
  # Täglich um 03:30 UTC (05:30 MESZ / 04:30 MEZ)
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

concurrency:
  group: sync-prompts
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret missing"; exit 1
          fi
          if [ -z "${{ vars.SUPABASE_PROJECT_REF }}" ] && [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "::error::SUPABASE_PROJECT_REF missing (var or secret)"; exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run sync script
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/sync-prompts-from-supabase.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prompts/
          if git diff --staged --quiet; then
            echo "Keine Änderungen — kein Commit"
          else
            git commit -m "chore: sync master-prompts from Supabase"
            git push
          fi
